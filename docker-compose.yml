version: "3.8"

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_NAME: finsplit
      DB_USER: finsplit
      # CORRIGIDO: segredos vêm do .env (não versionado), não mais em texto claro.
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: finsplit
      POSTGRES_USER: finsplit
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # CORRIGIDO: porta apenas na rede interna do compose, não publicada no host.
    expose:
      - "5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
